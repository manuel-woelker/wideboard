name: Build Server Artifact

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Ensure tool-tool is executable
        run: chmod +x tool-tool

      - name: Install UI dependencies
        run: |
          cd ui
          ../tool-tool pnpm install --frozen-lockfile

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cd ui
          ../tool-tool pnpm exec prettier --check .

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: |
          cargo test --workspace
          cd ui
          ../tool-tool pnpm test

      - name: Build UI assets and zip bundle
        run: |
          cd ui
          ../tool-tool pnpm build
          cd dist
          zip -r ../../ui-assets.zip .

      - name: Build release server and append UI bundle
        run: |
          cargo build --release -p server
          cp target/release/server target/release/wideboard
          cat ui-assets.zip >> target/release/wideboard
          chmod +x target/release/wideboard

      - name: Upload bundled server artifact
        uses: actions/upload-artifact@v4
        with:
          name: wideboard-${{ github.sha }}
          path: target/release/wideboard
