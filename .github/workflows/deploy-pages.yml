name: Deploy UI and Storybook to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Ensure tool-tool is executable
        run: chmod +x tool-tool

      - name: Install dependencies
        run: |
          cd ui
          ../tool-tool pnpm install --frozen-lockfile

      - name: Build UI
        run: |
          cd ui
          ../tool-tool pnpm exec tsc -b
          ../tool-tool pnpm exec vite build --base="/${{ github.event.repository.name }}/"

      - name: Build Storybook
        run: |
          cd ui
          STORYBOOK_BASE_PATH="/${{ github.event.repository.name }}/storybook/" ../tool-tool pnpm exec storybook build --output-dir ../pages/storybook

      - name: Assemble Pages artifact
        run: |
          mkdir -p pages
          cp -R ui/dist/. pages/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
